name: engines-ci

on:
  push:
    branches: [main]
    paths:
      - "packages/engines/**"
      - ".github/workflows/engines-ci.yml"
  pull_request:
    paths:
      - "packages/engines/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engines
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest --cov=src/bomatech_engines --cov-report=term-missing
